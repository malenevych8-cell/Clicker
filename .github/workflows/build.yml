name: Build Physics Clicker iOS 26
on: [push]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile Physics Engine
        run: |
          # Компілюємо main.swift з націленістю на iOS 26
          xcrun -sdk iphoneos swiftc main.swift \
          -target arm64-apple-ios26.0 \
          -o ClickerApp \
          -Xlinker -rpath -Xlinker /usr/lib/swift \
          -Xlinker -rpath -Xlinker @executable_path/Frameworks

      - name: Create App Bundle Structure
        run: |
          mkdir -p Payload/Clicker.app
          mv ClickerApp Payload/Clicker.app/Clicker
          
          # Створюємо Info.plist
          cat <<EOF > Payload/Clicker.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Clicker</string>
              <key>CFBundleIdentifier</key>
              <string>com.svzt.physics.clicker</string>
              <key>CFBundleName</key>
              <string>PhysicsClicker</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>26.3.1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Package to IPA
        run: zip -r Clicker.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhysicsClicker_v26_Final
          path: Clicker.ipa

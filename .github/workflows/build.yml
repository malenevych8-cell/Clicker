name: Build Clicker IPA
on: [push]

jobs:
  build:
    # Використовуємо мак, бо тільки він вміє робити .ipa
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        # Встановлюємо версію Xcode, яка знає про iOS 26.3.1
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build App Assets
        run: |
          mkdir -p build/Clicker.xcarchive
          # Компіляція Swift коду в додаток
          swiftc ViewController.swift AppDelegate.swift -o ClickerApp -target arm64-apple-ios17.0 -sdk $(xcrun --show-sdk-path --sdk iphoneos)

      - name: Create Payload and IPA
        run: |
          mkdir -p Payload/Clicker.app
          mv ClickerApp Payload/Clicker.app/
          # Пакуємо в .ipa архів
          zip -r Clicker.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clicker_Build_iOS_26
          path: Clicker.ipa
